<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats | Medway Invicta FC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="bg-gradient-to-br from-red-950 via-black to-red-900 text-white font-sans">

  <!-- Header -->
  <header class="flex justify-between items-center px-6 py-5 border-b border-red-700 backdrop-blur-md bg-black/30 sticky top-0 z-50">
    <h1 class="flex items-center space-x-3 text-2xl md:text-3xl font-bold tracking-wide">
      <img src="MI logo.jpg" class="h-10 w-10 object-contain" />
      <span>Medway Invicta FC</span>
    </h1>

    <nav class="hidden md:flex space-x-6 text-sm">
      <a href="index.html" class="hover:text-red-400">Home</a>
      <a href="Team.html" class="hover:text-red-400">Team</a>
      <a href="Fixtures.html" class="hover:text-red-400">Fixtures</a>
      <a href="Standings.html" class="hover:text-red-400">Standings</a>
      <a href="Contact.html" class="hover:text-red-400">Contact</a>
      <a href="Gallery.html" class="hover:text-red-400">Gallery</a>
      <a href="GA.html" class="text-red-400 font-semibold">Stats</a>
    </nav>

    <button id="burger" class="md:hidden">
      <i data-lucide="menu" class="w-8 h-8"></i>
    </button>
  </header>

  <!-- Hero -->
  <section class="text-center py-12">
    <h2 class="text-4xl md:text-5xl font-extrabold mb-3">Player Stats</h2>
    <p class="text-gray-400">Top scorers this season</p>
  </section>

  <!-- Stats Cards (Top Players) -->
  <section class="max-w-6xl mx-auto px-4 grid md:grid-cols-3 gap-6 mb-10" id="topCards"></section>

  <!-- Table -->
  <section class="max-w-6xl mx-auto px-4 pb-16">
    <div class="bg-black/40 border border-red-800 rounded-2xl overflow-hidden shadow-xl">
      <table class="w-full text-left">
        <thead class="bg-red-800/80 text-white text-sm uppercase tracking-wider">
          <tr>
            <th class="p-4">#</th>
            <th class="p-4">Player</th>
            <th class="p-4">Position</th>
            <th class="p-4">Goals</th>
          </tr>
        </thead>
        <tbody id="statsBody" class="divide-y divide-red-900 text-gray-300"></tbody>
      </table>
    </div>
  </section>

  <footer class="text-center border-t border-red-700 py-6 text-sm text-gray-400">
    &copy; 2026 Medway Invicta FC
  </footer>

<script>
lucide.createIcons();

const players = [
  {name:"Thomas Ngegba", pos:"Striker", goals:8},
  {name:"Temi Ayetigbo", pos:"Winger", goals:7},
  {name:"Samuel Shobande", pos:"Winger", goals:11},
  {name:"Ayo Jimoh", pos:"Striker", goals:8},
  {name:"Owen Longman", pos:"Defender", goals:8},
  {name:"Jamie Blackham", pos:"Midfielder", goals:5},
  {name:"Matthew Thomas", pos:"Winger", goals:5},
  {name:"Manny Akinso", pos:"Defender", goals:2},
  {name:"Michael Shobande", pos:"Winger", goals:11},
  {name:"Michael Hurcomb", pos:"Striker", goals:1},
  {name:"Abdul-Raheem Sunmonu", pos:"Defender", goals:1},
  {name:"Toby Ogundemuren", pos:"Mgr/Midfielder", goals:0},
  {name:"Jordan Buckfield-Waller", pos:"Defender", goals:0},
  {name:"Adriano Anglin", pos:"Winger", goals:2},
  {name:"Yeni Yusuph", pos:"Striker", goals:3},
  {name:"James Rocha", pos:"Defender", goals:2},
  {name:"Connor Mudima", pos:"Midfielder", goals:1}
];

// Sort
players.sort((a,b)=>b.goals-a.goals);

const tbody = document.getElementById("statsBody");
const topCards = document.getElementById("topCards");

// Top 3 cards
players.slice(0,3).forEach((p,i)=>{
  const card = document.createElement("div");
  card.className = "bg-gradient-to-br from-red-800 to-red-950 p-6 rounded-2xl shadow-lg hover:scale-105 transition";
  card.innerHTML = `
    <div class="text-sm text-gray-300 mb-2">#${i+1} Top Scorer</div>
    <div class="text-2xl font-bold">${p.name}</div>
    <div class="text-gray-400">${p.pos}</div>
    <div class="mt-4 text-4xl font-extrabold text-yellow-400">${p.goals}</div>
  `;
  topCards.appendChild(card);
});

// Table
players.forEach((p,i)=>{
  const tr = document.createElement("tr");

  tr.className = "hover:bg-red-900/40 transition";

  if(i < 3){
    tr.classList.add("bg-yellow-400/10","text-yellow-300","font-semibold");
  }

  tr.innerHTML = `
    <td class="p-4">${i+1}</td>
    <td class="p-4">${p.name}</td>
    <td class="p-4">${p.pos}</td>
    <td class="p-4 font-bold">${p.goals}</td>
  `;

  tbody.appendChild(tr);
});
</script>

</body>
</html>

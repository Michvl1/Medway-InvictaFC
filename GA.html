<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stats | Medway Invicta FC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>

<body class="bg-gradient-to-br from-red-950 via-black to-red-900 text-white font-sans">

<!-- Header -->
<header class="relative flex justify-between items-center px-6 py-5 border-b border-red-700 backdrop-blur-md bg-black/30 sticky top-0 z-50">
  <h1 class="flex items-center space-x-3 text-2xl md:text-3xl font-bold tracking-wide">
    <img src="MI logo.jpg" class="h-10 w-10 object-contain" />
    <span>Medway Invicta FC</span>
  </h1>
</header>

<!-- Hero -->
<section class="text-center py-12">
  <h2 class="text-4xl md:text-5xl font-extrabold mb-3">Player Stats</h2>
  <p class="text-gray-400">Top scorers this season</p>
</section>

<!-- TOP 5 FEATURE -->
<section class="max-w-6xl mx-auto px-4 mb-12">
  <div class="bg-black/40 border border-red-800 rounded-2xl overflow-hidden shadow-xl">
    <div class="bg-red-800 text-center py-3 font-bold text-lg tracking-wider">
      TOP 5 GOAL SCORERS
    </div>
    <div id="top5List"></div>
  </div>
</section>

<!-- TABLE BELOW -->
<section class="max-w-6xl mx-auto px-4 pb-16">
  <div class="bg-black/40 border border-red-800 rounded-2xl overflow-hidden shadow-xl">
    <table class="w-full text-left">
      <thead class="bg-red-800/80 text-white text-sm uppercase tracking-wider">
        <tr>
          <th class="p-4">#</th>
          <th class="p-4">Player</th>
          <th class="p-4">Position</th>
          <th class="p-4">Goals</th>
        </tr>
      </thead>
      <tbody id="statsBody" class="divide-y divide-red-900 text-gray-300"></tbody>
    </table>
  </div>
</section>

<footer class="text-center border-t border-red-700 py-6 text-sm text-gray-400">
  &copy; 2026 Medway Invicta FC
</footer>

<script>
lucide.createIcons();

// PLAYER DATA (ADD IMAGES/FLAGS/BADGES OPTIONAL)
const players = [
  {name:"Thomas Ngegba", pos:"Striker", goals:8, img:"https://via.placeholder.com/80", flag:"https://flagcdn.com/w40/ng.png", badge:"MI logo.jpg"},
  {name:"Temi Ayetigbo", pos:"Winger", goals:9, img:"Temi.jpg", flag:"https://flagcdn.com/w40/ng.png", badge:"MI logo.jpg"},
  {name:"Samuel Shobande", pos:"Winger", goals:12, img:"https://via.placeholder.com/80", flag:"https://flagcdn.com/w40/ng.png", badge:"MI logo.jpg"},
  {name:"Ayo Jimoh", pos:"Striker", goals:8, img:"https://via.placeholder.com/80", flag:"https://flagcdn.com/w40/ng.png", badge:"MI logo.jpg"},
  {name:"Owen Longman", pos:"Defender", goals:8, img:"https://via.placeholder.com/80", flag:"https://flagcdn.com/w40/gb.png", badge:"MI logo.jpg"},
  {name:"Jamie Blackham", pos:"Midfielder", goals:5},
  {name:"Matthew Thomas", pos:"Winger", goals:6},
  {name:"Manny Akinso", pos:"Defender", goals:2},
  {name:"Michael Shobande", pos:"Winger", goals:12, img:"IMG_5046.jpg", flag:"https://flagcdn.com/w40/ng.png", badge:"MI logo.jpg"},
  {name:"Michael Hurcomb", pos:"Striker", goals:1},
  {name:"Abdul-Raheem Sunmonu", pos:"Defender", goals:1},
  {name:"Toby Ogundemuren", pos:"Mgr/Midfielder", goals:0},
  {name:"Jordan Buckfield-Waller", pos:"Defender", goals:0},
  {name:"Adriano Anglin", pos:"Winger", goals:2},
  {name:"Yeni Yusuph", pos:"Striker", goals:3},
  {name:"James Rocha", pos:"Defender", goals:2},
  {name:"Connor Mudima", pos:"Midfielder", goals:1}
];

// SORT
players.sort((a,b)=>b.goals-a.goals);

// TOP 5 UI
const gradients = [
  "from-blue-500 to-blue-700",
  "from-indigo-500 to-indigo-700",
  "from-blue-600 to-blue-800",
  "from-purple-600 to-purple-800",
  "from-red-600 to-red-800"
];

const top5Container = document.getElementById("top5List");

players.slice(0,5).forEach((p,i)=>{
  const row = document.createElement("div");

  row.className = `flex items-center justify-between p-4 md:p-6 bg-gradient-to-r ${gradients[i]} border-b border-black/30`;

  row.innerHTML = `
    <div class="flex items-center space-x-4">
      <img src="${p.flag || 'https://via.placeholder.com/40'}" class="w-10 h-7 object-cover rounded"/>
      <img src="${p.img || 'https://via.placeholder.com/80'}" class="w-16 h-16 object-cover rounded-full border-2 border-white"/>
      <div>
        <div class="font-bold text-lg">${p.name}</div>
        <div class="text-sm text-gray-200">${p.pos}</div>
      </div>
    </div>

    <div class="flex items-center space-x-6">
      <div class="text-right">
        <div class="text-sm uppercase text-gray-200">Goals</div>
        <div class="text-3xl font-extrabold">${p.goals}</div>
      </div>
      <img src="${p.badge || 'https://via.placeholder.com/50'}" class="w-12"/>
    </div>
  `;

  top5Container.appendChild(row);
});

// TABLE (ALL PLAYERS)
const tbody = document.getElementById("statsBody");

players.forEach((p,i)=>{
  const tr = document.createElement("tr");

  tr.className = "hover:bg-red-900/40 transition";

  if(i < 3){
    tr.classList.add("bg-yellow-400/10","text-yellow-300","font-semibold");
  }

  tr.innerHTML = `
    <td class="p-4">${i+1}</td>
    <td class="p-4">${p.name}</td>
    <td class="p-4">${p.pos}</td>
    <td class="p-4 font-bold">${p.goals}</td>
  `;

  tbody.appendChild(tr);
});

</script>

</body>
</html>

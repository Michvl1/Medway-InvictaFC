<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Squad - Medway Invicta FC</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gradient-to-br from-black via-red-950 to-black text-white font-sans">

<header class="flex justify-between items-center p-6 border-b border-red-600">
  <h1 class="flex items-center space-x-3 text-3xl font-bold">
    <img src="MI logo.jpg" class="h-12 w-12"/>
    <span>Medway Invicta FC</span>
  </h1>

  <nav class="hidden md:flex space-x-6">
    <a href="index.html" class="hover:text-red-400">Home</a>
    <a href="Team.html" class="hover:text-red-400">Team</a>
    <a href="Fixtures.html" class="hover:text-red-400">Fixtures</a>
    <a href="Standings.html" class="hover:text-red-400">Standings</a>
    <a href="Contact.html" class="hover:text-red-400">Contact</a>
    <a href="Gallery.html" class="hover:text-red-400">Gallery</a>
    <a href="GA.html" class="hover:text-red-400">Goals</a>
  </nav>

  <button id="burger" class="md:hidden">
    <i data-lucide="menu" class="w-8 h-8"></i>
  </button>

  <div id="mobileMenu" class="absolute top-full right-6 mt-2 bg-red-950 border border-red-600 rounded-lg shadow-lg w-40 p-4 space-y-2 hidden">
    <a href="index.html">Home</a>
    <a href="Team.html">Team</a>
    <a href="Fixtures.html">Fixtures</a>
    <a href="Standings.html">Standings</a>
    <a href="Contact.html">Contact</a>
    <a href="Gallery.html">Gallery</a>
    <a href="GA.html">Goals</a>
  </div>
</header>

<!-- PLAYERS GRID -->
<section id="playersContainer" class="p-6 grid grid-cols-2 md:grid-cols-4 gap-6"></section>

<script>
lucide.createIcons();

/* Burger menu */
const burger = document.getElementById("burger");
const mobileMenu = document.getElementById("mobileMenu");

burger.addEventListener("click", () => {
  mobileMenu.classList.toggle("hidden");
});

/* PLAYER DATA */
const players = [
  {name:"Emmanuel Akinso", position:"Defender", img:"placeholder.jpg"},
  {name:"Adriano Anglin", position:"Defender", img:"IMG_5047.jpeg"},
  {name:"Temi Ayetigbo", position:"Winger", img:"Temi.jpg"},
  {name:"Jamie Blackham", position:"Midfielder", img:"JAMIE.jpeg"},
  {name:"Jordan Buckfield-Waller", position:"Defender", img:"placeholder.jpg"},
  {name:"Ayo Jimoh", position:"Striker", img:"AJ.jpeg"},
  {name:"Shaun Keen", position:"Defender", img:"placeholder.jpg"},
  {name:"Evan Longman", position:"Goalkeeper", img:"EVAN.jpg"},
  {name:"Owen Longman", position:"Defender", img:"OWEN.jpeg"},
  {name:"Caleb Luckhurst", position:"Defender", img:"Caleb Luckhurst.jpg"},
  {name:"Tom Mercer", position:"Midfielder", img:"MERCER.jpeg"},
  {name:"Connor Mudima", position:"Midfielder", img:"CONNOR.jpeg"},
  {name:"Thomas Ngegba", position:"Striker", img:"placeholder.jpg"},
  {name:"Toby Ogundemuren", position:"Manager", img:"placeholder.jpg"},
  {name:"Victor Okunowo", position:"Winger", img:"placeholder.jpg"},
  {name:"Adeboye Oloyede", position:"Defender", img:"Boye signed.png"},
  {name:"Liam Riley", position:"Goalkeeper", img:"placeholder.jpg"},
  {name:"James Rocha", position:"Defender", img:"James.jpg"},
  {name:"Michael Shobande", position:"Winger", img:"IMG_5046.jpeg"},
  {name:"Samuel Shobande", position:"Winger", img:"IMG_5044.jpeg"},
  {name:"William Sims", position:"Midfielder", img:"placeholder.jpg"},
  {name:"Matthew Thomas", position:"Winger", img:"NASH.jpeg"},
  {name:"Ben Van-de-Peer", position:"Defender", img:"BEN.jpeg"}
];

/* RENDER PLAYERS */
const container = document.getElementById("playersContainer");

players.forEach(p => {
  container.innerHTML += `
  <div class="bg-red-950 p-4 rounded-xl text-center hover:scale-105 transition">
    <img src="${p.img}" class="h-20 w-20 mx-auto rounded-full mb-2 object-cover">
    <h3 class="font-semibold">${p.name}</h3>
    <p class="text-red-400 text-sm">${p.position}</p>
  </div>`;
});
</script>

</body>
</html>

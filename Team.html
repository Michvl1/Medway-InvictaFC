<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Squad - Medway Invicta FC</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-red-950 to-black text-white font-sans">

<header class="flex justify-between items-center p-6 border-b border-red-600">
  <h1 class="flex items-center space-x-3 text-3xl font-bold">
    <img src="MI logo.jpg" class="h-12 w-12"/>
    <span>Medway Invicta FC</span>
  </h1>

    <!-- Desktop Nav -->
    <nav class="hidden md:flex space-x-6">
      <a href="index.html" class="hover:text-red-400 transition">Home</a>
      <a href="Team.html" class="hover:text-red-400 transition">Team</a>
      <a href="Fixtures.html" class="hover:text-red-400 transition">Fixtures</a>
      <a href="Standings.html" class="hover:text-red-400 transition">Standings</a>
      <a href="Contact.html" class="hover:text-red-400 transition">Contact</a>
      <a href="Gallery.html" class="hover:text-red-400 transition">Gallery</a>
      <a href="GA.html" class="hover:text-red-400 transition">Goals</a>
    </nav>

    <!-- Burger Icon -->
    <button id="burger" class="md:hidden">
      <i data-lucide="menu" class="w-8 h-8 text-white"></i>
    </button>

    <!-- Mobile Menu -->
    <div id="mobileMenu" class="absolute top-full right-6 mt-2 bg-red-950 border border-red-600 rounded-lg shadow-lg w-40 flex-col items-start p-4 space-y-2 hidden z-50">
      <a href="index.html" class="block hover:text-red-400 transition">Home</a>
      <a href="Team.html" class="block hover:text-red-400 transition">Team</a>
      <a href="Fixtures.html" class="block hover:text-red-400 transition">Fixtures</a>
      <a href="Standings.html" class="block hover:text-red-400 transition">Standings</a>
      <a href="Contact.html" class="block hover:text-red-400 transition">Contact</a>
      <a href="Gallery.html" class="block hover:text-red-400 transition">Gallery</a>
      <a href="GA.html" class="block hover:text-red-400 transition">Goals</a>
    </div>
  </header>


<section class="p-6 grid grid-cols-2 md:grid-cols-4 gap-6">

<script>
const players = [
"Evan Longman","Ben Van-de-Peer","Jamie Blackham","Connor Mudima","William Sims","Abdul-Raheem Sunmonu",
"Michael Shobande","Toby Ogundemuren","Samuel Shobande","Ayo Jimoh","Owen Longman","Matthew Thomas",
"James Rocha","Shaun Keen","Victor Okunowo","Bolu Buraimoh","Tom Mercer","Jordan Buckfield-Waller",
"Michael Hurcomb","Adriano Anglin","Temi Ayetigbo","Caleb Luckhurst","Oge Agwu","Yeni Yusuph",
"Yomi Yusuph","Thomas Ngegba","Liam Riley","Boye Oloyede"
];

const positions = {
"Evan Longman":"Goalkeeper","Ben Van-de-Peer":"Defender","Jamie Blackham":"Midfielder","Connor Mudima":"Midfielder",
"William Sims":"Midfielder","Abdul-Raheem Sunmonu":"Defender","Michael Shobande":"Winger","Toby Ogundemuren":"Midfielder",
"Samuel Shobande":"Striker","Ayo Jimoh":"Striker","Owen Longman":"Defender","Matthew Thomas":"Winger",
"James Rocha":"Defender","Shaun Keen":"Defender","Victor Okunowo":"Midfielder","Bolu Buraimoh":"Midfielder",
"Tom Mercer":"Midfielder","Jordan Buckfield-Waller":"Defender","Michael Hurcomb":"Striker","Adriano Anglin":"Winger",
"Temi Ayetigbo":"Winger","Caleb Luckhurst":"Midfielder","Oge Agwu":"Midfielder","Yeni Yusuph":"Striker",
"Yomi Yusuph":"Defender","Thomas Ngegba":"Striker","Liam Riley":"Goalkeeper","Boye Oloyede":"Defender"
};

/* ✅ CLEAN IMAGE MAP */
const playerImages = {
  "Evan Longman": "EVAN.jpg",
  "Ben Van-de-Peer": "BEN.jpg",
  "Jamie Blackham": "JAMIE.jpg",
  "Connor Mudima": "CONNOR.jpeg",
  "Owen Longman": "OWEN.jpg",
  "James Rocha": "james.jpg",
  "Tom Mercer": "Mercer.jpeg",
  "Caleb Luckhurst": "Caleb Luckhurst.jpg",
  "Michael Shobande": "IMG_5046.jpeg",
  "Matthew Thomas": "NASH.jpeg",
  "Temi Ayetigbo": "Temi.jpg",
  "Ayo Jimoh": "AJ.jpeg",
  "Boye Oloyede": "Boye signed.png",
  "Samuel Shobande": "IMG_5044.jpeg",
  "Adriano Anglin": "IMG_5047.jpeg"
};

let playerStats = {};
let currentPlayer = "";

const container = document.currentScript.parentElement;

players.forEach(name=>{
  const img = playerImages[name] || "placeholder.jpg";

  container.innerHTML += `
  <div onclick="openCard('${name}')" class="bg-red-950 p-4 rounded-xl text-center cursor-pointer hover:scale-105 transition shadow-lg">
    <img src="${img}" onerror="this.src='placeholder.jpg'" class="h-20 w-20 mx-auto rounded-full mb-2">
    <h3 class="font-semibold">${name}</h3>
    <p class="text-red-400">${positions[name]}</p>
  </div>`;
});
</script>

</section>

<!-- Modal -->
<div id="playerModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">

<div id="card" class="w-80 p-6 text-center relative text-white rounded-3xl shadow-2xl">

<div class="flex justify-center -mt-16 mb-2">
  <img id="playerImg" class="w-24 h-24 rounded-full border-4 border-white object-cover">
</div>

<div onclick="editOverall()" id="overall" class="absolute top-2 left-3 text-2xl font-bold cursor-pointer"></div>
<div id="posBadge" class="absolute top-2 right-3 text-xs bg-black/40 px-2 py-1 rounded"></div>

<button onclick="closeCard()" class="absolute top-1 right-2 text-xl">×</button>

<h3 id="cardName" class="text-sm font-bold mt-2"></h3>
<p id="cardPos" class="text-xs text-gray-200"></p>

<select onchange="changeCardType(this.value)" class="mt-2 text-black text-xs rounded px-2 py-1">
<option value="bronze">Bronze</option>
<option value="silver">Silver</option>
<option value="gold">Gold</option>
<option value="rare">Rare</option>
</select>

<div class="space-y-3 mt-3 text-xs">

<div onclick="editStat('pace')" class="cursor-pointer">PACE
<div class="bg-black/30 h-2 rounded"><div id="paceBar" class="h-2 bg-white rounded"></div></div></div>

<div onclick="editStat('sho')" class="cursor-pointer">SHO
<div class="bg-black/30 h-2 rounded"><div id="shoBar" class="h-2 bg-white rounded"></div></div></div>

<div onclick="editStat('pas')" class="cursor-pointer">PAS
<div class="bg-black/30 h-2 rounded"><div id="pasBar" class="h-2 bg-white rounded"></div></div></div>

<div onclick="editStat('dri')" class="cursor-pointer">DRI
<div class="bg-black/30 h-2 rounded"><div id="driBar" class="h-2 bg-white rounded"></div></div></div>

<div onclick="editStat('def')" class="cursor-pointer">DEF
<div class="bg-black/30 h-2 rounded"><div id="defBar" class="h-2 bg-white rounded"></div></div></div>

<div onclick="editStat('phy')" class="cursor-pointer">PHY
<div class="bg-black/30 h-2 rounded"><div id="phyBar" class="h-2 bg-white rounded"></div></div></div>

</div>
</div>
</div>

<script>
function openCard(name){
  currentPlayer = name;

  if(!playerStats[name]){
    playerStats[name] = {pace:50, sho:50, pas:50, dri:50, def:50, phy:50, overall:null, type:"silver"};
  }

  const s = playerStats[name];

  document.getElementById('playerModal').classList.remove('hidden');
  document.getElementById('playerModal').classList.add('flex');

  document.getElementById('cardName').innerText=name;
  document.getElementById('cardPos').innerText=positions[name];
  document.getElementById('posBadge').innerText=positions[name];

  document.getElementById('playerImg').src = playerImages[name] || "placeholder.jpg";

  const overall = s.overall !== null ? s.overall :
    Math.round((s.pace+s.sho+s.pas+s.dri+s.def+s.phy)/6);

  document.getElementById('overall').innerText=overall;

  setBar('paceBar',s.pace);
  setBar('shoBar',s.sho);
  setBar('pasBar',s.pas);
  setBar('driBar',s.dri);
  setBar('defBar',s.def);
  setBar('phyBar',s.phy);

  applyCardStyle(s.type);
}

function setBar(id,val){
  const el=document.getElementById(id);
  if(el) el.style.width = val + '%';
}

function passwordCheck(){
  const firstName = currentPlayer.split(" ")[0].toLowerCase();
  const input = prompt("Enter password:");
  return input && input.toLowerCase() === firstName;
}

function editStat(stat){
  if(!passwordCheck()){ alert("Incorrect password"); return; }

  const val = parseInt(prompt("Enter value (0-100):"));
  if(isNaN(val)||val<0||val>100){ alert("Invalid"); return; }

  playerStats[currentPlayer][stat] = val;
  openCard(currentPlayer);
}

function editOverall(){
  if(!passwordCheck()){ alert("Incorrect password"); return; }

  const val = parseInt(prompt("Enter overall (0-100):"));
  if(isNaN(val)||val<0||val>100){ alert("Invalid"); return; }

  playerStats[currentPlayer].overall = val;
  openCard(currentPlayer);
}

function changeCardType(type){
  if(!passwordCheck()){ alert("Incorrect password"); return; }

  playerStats[currentPlayer].type = type;
  applyCardStyle(type);
}

function applyCardStyle(type){
  const card = document.getElementById('card');

  if(type==='gold') card.style.background='linear-gradient(gold,orange)';
  else if(type==='silver') card.style.background='linear-gradient(lightgray,gray)';
  else if(type==='bronze') card.style.background='linear-gradient(#cd7f32,#8c4a1f)';
  else if(type==='rare') card.style.background='linear-gradient(purple,pink,red)';
}

function closeCard(){
  document.getElementById('playerModal').classList.add('hidden');
}
</script>

</body>
</html>

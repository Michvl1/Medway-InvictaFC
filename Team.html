<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Squad - Medway Invicta FC</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-red-950 to-black text-white font-sans">

<header class="relative flex justify-between items-center p-6 border-b border-red-600">
  <h1 class="flex items-center space-x-3 text-3xl font-bold">
    <img src="MI logo.jpg" class="h-12 w-12"/>
    <span>Medway Invicta FC</span>
  </h1>

  <nav class="hidden md:flex space-x-6">
    <a href="index.html">Home</a>
    <a href="Team.html">Team</a>
    <a href="Fixtures.html">Fixtures</a>
    <a href="Standings.html">Standings</a>
    <a href="Contact.html">Contact</a>
    <a href="Gallery.html">Gallery</a>
    <a href="GA.html">Goals</a>
  </nav>
</header>

<section id="playersContainer" class="p-6 grid grid-cols-2 md:grid-cols-4 gap-6"></section>

<!-- MODAL -->
<div id="playerModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <div id="card" class="w-80 p-6 text-center relative text-white rounded-3xl shadow-2xl">

    <div class="flex justify-center mb-3">
      <img id="playerImg" class="w-28 h-28 rounded-full border-4 border-white object-cover">
    </div>

    <div onclick="editOverall()" id="overall" class="absolute top-3 left-4 text-2xl font-bold cursor-pointer"></div>
    <div id="posBadge" class="absolute top-3 right-4 text-xs bg-black/40 px-2 py-1 rounded"></div>

    <button onclick="closeCard()" class="absolute top-2 right-3 text-xl">×</button>

    <h3 id="cardName" class="text-lg font-bold mt-1"></h3>
    <p id="cardPos" class="text-sm text-gray-200 mb-2"></p>

    <select onchange="changeCardType(this.value)" class="mt-1 text-black text-xs rounded px-2 py-1">
      <option value="bronze">Bronze</option>
      <option value="silver">Silver</option>
      <option value="gold">Gold</option>
      <option value="rare">Special</option>
    </select>

    <div class="space-y-2 mt-4 text-xs">
      <div onclick="editStat('pace')">PACE<div class="bg-black/30 h-2"><div id="paceBar" class="h-2 bg-white"></div></div></div>
      <div onclick="editStat('sho')">SHO<div class="bg-black/30 h-2"><div id="shoBar" class="h-2 bg-white"></div></div></div>
      <div onclick="editStat('pas')">PAS<div class="bg-black/30 h-2"><div id="pasBar" class="h-2 bg-white"></div></div></div>
      <div onclick="editStat('dri')">DRI<div class="bg-black/30 h-2"><div id="driBar" class="h-2 bg-white"></div></div></div>
      <div onclick="editStat('def')">DEF<div class="bg-black/30 h-2"><div id="defBar" class="h-2 bg-white"></div></div></div>
      <div onclick="editStat('phy')">PHY<div class="bg-black/30 h-2"><div id="phyBar" class="h-2 bg-white"></div></div></div>
    </div>

  </div>
</div>

<script>
const container = document.getElementById("playersContainer");

const players = ["Evan Longman","Ben Van-de-Peer","Jamie Blackham","Connor Mudima","William Sims","Abdul-Raheem Sunmonu","Michael Shobande","Toby Ogundemuren","Samuel Shobande","Ayo Jimoh","Owen Longman","Matthew Thomas","James Rocha","Shaun Keen","Victor Okunowo","Bolu Buraimoh","Tom Mercer","Jordan Buckfield-Waller","Michael Hurcomb","Adriano Anglin","Temi Ayetigbo","Caleb Luckhurst","Oge Agwu","Yeni Yusuph","Yomi Yusuph","Thomas Ngegba","Liam Riley","Boye Oloyede"];

const positions = {
"Evan Longman":"Goalkeeper","Ben Van-de-Peer":"Defender","Jamie Blackham":"Midfielder","Connor Mudima":"Midfielder",
"William Sims":"Midfielder","Abdul-Raheem Sunmonu":"Defender","Michael Shobande":"Winger","Toby Ogundemuren":"Midfielder",
"Samuel Shobande":"Striker","Ayo Jimoh":"Striker","Owen Longman":"Defender","Matthew Thomas":"Winger",
"James Rocha":"Defender","Shaun Keen":"Defender","Victor Okunowo":"Midfielder","Bolu Buraimoh":"Midfielder",
"Tom Mercer":"Midfielder","Jordan Buckfield-Waller":"Defender","Michael Hurcomb":"Striker","Adriano Anglin":"Winger",
"Temi Ayetigbo":"Winger","Caleb Luckhurst":"Midfielder","Oge Agwu":"Midfielder","Yeni Yusuph":"Striker",
"Yomi Yusuph":"Defender","Thomas Ngegba":"Striker","Liam Riley":"Goalkeeper","Boye Oloyede":"Defender"
};

const playerImages = {
  "Evan Longman":"EVAN.jpg","Ben Van-de-Peer":"BEN.jpg","Jamie Blackham":"JAMIE.jpg",
  "Connor Mudima":"CONNOR.jpeg","Owen Longman":"OWEN.jpg","James Rocha":"james.jpg",
  "Tom Mercer":"Mercer.jpeg","Caleb Luckhurst":"Caleb Luckhurst.jpg",
  "Michael Shobande":"IMG_5046.jpeg","Matthew Thomas":"NASH.jpeg","Temi Ayetigbo":"Temi.jpg",
  "Ayo Jimoh":"AJ.jpeg","Boye Oloyede":"Boye signed.png",
  "Samuel Shobande":"IMG_5044.jpeg","Adriano Anglin":"IMG_5047.jpeg"
};

const defaultData = {
"Evan Longman": {overall:72,type:"silver"},
"Ben Van-de-Peer": {overall:78,type:"gold"},
"Jamie Blackham": {overall:85,type:"gold"},
"Connor Mudima": {overall:76,type:"gold"},
"William Sims": {overall:65,type:"silver"},
"Abdul-Raheem Sunmonu": {overall:70,type:"silver"},
"Michael Shobande": {overall:92,type:"rare"},
"Toby Ogundemuren": {overall:68,type:"silver"},
"Samuel Shobande": {overall:94,type:"rare"},
"Ayo Jimoh": {overall:90,type:"rare"},
"Owen Longman": {overall:92,type:"rare"},
"Matthew Thomas": {overall:84,type:"gold"},
"James Rocha": {overall:75,type:"gold"},
"Shaun Keen": {overall:66,type:"silver"},
"Victor Okunowo": {overall:65,type:"silver"},
"Bolu Buraimoh": {overall:64,type:"bronze"},
"Tom Mercer": {overall:66,type:"silver"},
"Jordan Buckfield-Waller": {overall:73,type:"silver"},
"Michael Hurcomb": {overall:72,type:"silver"},
"Adriano Anglin": {overall:82,type:"gold"},
"Temi Ayetigbo": {overall:91,type:"rare"},
"Caleb Luckhurst": {overall:67,type:"silver"},
"Oge Agwu": {overall:63,type:"bronze"},
"Yeni Yusuph": {overall:86,type:"gold"},
"Yomi Yusuph": {overall:62,type:"bronze"},
"Thomas Ngegba": {overall:93,type:"rare"},
"Liam Riley": {overall:60,type:"bronze"},
"Boye Oloyede": {overall:69,type:"silver"}
};

let playerStats = {};
let currentPlayer = "";

function generateStats(o,p){
  if(p==="Striker") return {pace:o-5,sho:o+5,pas:o-10,dri:o,def:o-25,phy:o-5};
  if(p==="Winger") return {pace:o+5,sho:o,pas:o-5,dri:o+5,def:o-20,phy:o-5};
  if(p==="Midfielder") return {pace:o-5,sho:o-5,pas:o+5,dri:o,def:o-5,phy:o};
  if(p==="Defender") return {pace:o-10,sho:o-20,pas:o-5,dri:o-10,def:o+10,phy:o+5};
  return {pace:o,sho:o,pas:o,dri:o,def:o,phy:o};
}

players.forEach(name=>{
  const img = playerImages[name] || "placeholder.jpg";

  container.innerHTML += `
  <div onclick="openCard('${name}')" class="bg-red-950 p-4 rounded-xl text-center cursor-pointer hover:scale-105 transition">
    <img src="${img}" class="h-20 w-20 mx-auto rounded-full mb-2 object-cover">
    <h3>${name}</h3>
    <p class="text-red-400 text-sm">${positions[name]}</p>
  </div>`;
});

function openCard(name){
  currentPlayer=name;

  if(!playerStats[name]){
    let d=defaultData[name];
    playerStats[name]={...generateStats(d.overall,positions[name]),...d};
  }

  let s=playerStats[name];

  document.getElementById("playerModal").classList.remove("hidden");
  document.getElementById("playerModal").classList.add("flex");

  document.getElementById("cardName").innerText=name;
  document.getElementById("cardPos").innerText=positions[name];
  document.getElementById("posBadge").innerText=positions[name];
  document.getElementById("overall").innerText=s.overall;
  document.getElementById("playerImg").src = playerImages[name] || "placeholder.jpg";

  paceBar.style.width=s.pace+"%";
  shoBar.style.width=s.sho+"%";
  pasBar.style.width=s.pas+"%";
  driBar.style.width=s.dri+"%";
  defBar.style.width=s.def+"%";
  phyBar.style.width=s.phy+"%";

  applyCardStyle(s.type);
}

function applyCardStyle(type){
  if(type==="gold") card.style.background="linear-gradient(gold,orange)";
  else if(type==="silver") card.style.background="linear-gradient(lightgray,gray)";
  else if(type==="bronze") card.style.background="linear-gradient(#cd7f32,#8c4a1f)";
  else card.style.background="linear-gradient(purple,pink,red)";
}

function closeCard(){
  document.getElementById("playerModal").classList.add("hidden");
}
</script>

</body>
</html>

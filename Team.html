<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Squad - Medway Invicta FC</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-red-950 to-black text-white font-sans">

<header class="p-6 border-b border-red-600 text-center text-2xl font-bold">
  Medway Invicta FC
</header>

<section class="p-6 grid grid-cols-2 md:grid-cols-4 gap-6">

<script>
const players = [
"Evan Longman","Ben Van-de-Peer","Jamie Blackham","Connor Mudima","William Sims","Abdul-Raheem Sunmonu",
"Michael Shobande","Toby Ogundemuren","Samuel Shobande","Ayo Jimoh","Owen Longman","Matthew Thomas",
"James Rocha","Shaun Keen","Victor Okunowo","Bolu Buraimoh","Tom Mercer","Jordan Buckfield-Waller",
"Michael Hurcomb","Adriano Anglin","Temi Ayetigbo","Caleb Luckhurst","Oge Agwu","Yeni Yusuph",
"Yomi Yusuph","Thomas Ngegba","Liam Riley","Boye Oloyede"
];

const positions = {
"Evan Longman":"Goalkeeper","Ben Van-de-Peer":"Defender","Jamie Blackham":"Midfielder","Connor Mudima":"Midfielder",
"William Sims":"Midfielder","Abdul-Raheem Sunmonu":"Defender","Michael Shobande":"Winger","Toby Ogundemuren":"Midfielder",
"Samuel Shobande":"Striker","Ayo Jimoh":"Striker","Owen Longman":"Defender","Matthew Thomas":"Winger",
"James Rocha":"Defender","Shaun Keen":"Defender","Victor Okunowo":"Midfielder","Bolu Buraimoh":"Midfielder",
"Tom Mercer":"Midfielder","Jordan Buckfield-Waller":"Defender","Michael Hurcomb":"Striker","Adriano Anglin":"Winger",
"Temi Ayetigbo":"Winger","Caleb Luckhurst":"Midfielder","Oge Agwu":"Midfielder","Yeni Yusuph":"Striker",
"Yomi Yusuph":"Defender","Thomas Ngegba":"Striker","Liam Riley":"Goalkeeper","Boye Oloyede":"Defender"
};

const stats = {
"Samuel Shobande":{sho:96,type:"rare"},"Michael Shobande":{sho:96,type:"rare"},
"Thomas Ngegba":{sho:92,type:"gold"},"Ayo Jimoh":{sho:82,type:"gold"},"Owen Longman":{sho:78,type:"gold"},
"Temi Ayetigbo":{sho:92,type:"gold"},"Jamie Blackham":{sho:78,type:"gold"},"Matthew Thomas":{sho:72,type:"silver"},
"Yeni Yusuph":{sho:84,type:"bronze"},"Adriano Anglin":{sho:80,type:"silver"},"James Rocha":{sho:76,type:"gold"},
"Michael Hurcomb":{sho:87,type:"bronze"},"Abdul-Raheem Sunmonu":{sho:82,type:"bronze"},"Connor Mudima":{sho:74,type:"gold"},
"Toby Ogundemuren":{sho:70,type:"silver"},"Jordan Buckfield-Waller":{sho:74,type:"silver"},"Evan Longman":{sho:80,type:"rare"}
};

const container = document.currentScript.parentElement;

players.forEach(name=>{
  container.innerHTML += `
  <div onclick="openCard('${name}')" class="bg-red-950 p-4 rounded-xl text-center cursor-pointer hover:scale-105 transition shadow-lg">
    <img src="placeholder.jpg" class="h-20 w-20 mx-auto rounded-full mb-2">
    <h3 class="font-semibold">${name}</h3>
    <p class="text-red-400">${positions[name]}</p>
  </div>`;
});
</script>

</section>

<!-- Modal -->
<div id="playerModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">

  <div id="card" class="w-80 p-6 text-center relative text-white rounded-3xl overflow-hidden border border-white/20 shadow-2xl">

    <!-- subtle shine overlay -->
    <div class="absolute inset-0 opacity-10 pointer-events-none bg-gradient-to-r from-transparent via-white to-transparent animate-pulse"></div>

    <!-- Top badges -->
    <div id="overall" class="absolute top-2 left-3 text-2xl font-bold"></div>
    <div id="posBadge" class="absolute top-2 right-3 text-xs bg-black/40 px-2 py-1 rounded"></div>

    <button onclick="closeCard()" class="absolute top-1 right-2 text-xl">×</button>

    <h3 id="cardName" class="mt-6 text-lg font-bold"></h3>
    <p id="cardPos" class="text-sm text-gray-200"></p>

    <!-- Stats -->
    <div class="space-y-2 mt-4 text-sm">
      <div>PACE<div class="bg-black/30 h-2 rounded"><div id="paceBar" class="h-2 bg-white rounded"></div></div></div>
      <div>SHO<div class="bg-black/30 h-2 rounded"><div id="shoBar" class="h-2 bg-white rounded"></div></div></div>
      <div>PAS<div class="bg-black/30 h-2 rounded"><div id="pasBar" class="h-2 bg-white rounded"></div></div></div>
      <div>DRI<div class="bg-black/30 h-2 rounded"><div id="driBar" class="h-2 bg-white rounded"></div></div></div>
      <div>DEF<div class="bg-black/30 h-2 rounded"><div id="defBar" class="h-2 bg-white rounded"></div></div></div>
      <div>PHY<div class="bg-black/30 h-2 rounded"><div id="phyBar" class="h-2 bg-white rounded"></div></div></div>
    </div>

  </div>
</div>

<script>
function openCard(name){
  const pos = positions[name];
  const s = stats[name] || {sho:5,type:"silver"};

  const pace=50, pas=50, dri=50, def=50, phy=50;

  document.getElementById('playerModal').classList.remove('hidden');
  document.getElementById('playerModal').classList.add('flex');

  document.getElementById('cardName').innerText=name;
  document.getElementById('cardPos').innerText=pos;
  document.getElementById('posBadge').innerText=pos;

  const overall=Math.round((pace+s.sho+pas+dri+def+phy)/6);
  document.getElementById('overall').innerText=overall;

  const setBar=(id,val)=>{
    const el=document.getElementById(id);
    if(el) el.style.width=(val*10)+'%';
  }

  setBar('paceBar',pace);
  setBar('shoBar',s.sho);
  setBar('pasBar',pas);
  setBar('driBar',dri);
  setBar('defBar',def);
  setBar('phyBar',phy);

  const card=document.getElementById('card');

  if(s.type==='gold') card.style.background='linear-gradient(gold,orange)';
  else if(s.type==='silver') card.style.background='linear-gradient(lightgray,gray)';
  else if(s.type==='bronze') card.style.background='linear-gradient(#cd7f32,#8c4a1f)';
  else if(s.type==='rare') card.style.background='linear-gradient(purple,pink,red)';
}

function closeCard(){
  document.getElementById('playerModal').classList.add('hidden');
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Our Squad - Medway Invicta FC</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@keyframes glowMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes pulseGlow {
  0% { box-shadow: 0 0 10px rgba(255,0,255,0.4); }
  50% { box-shadow: 0 0 25px rgba(255,0,255,0.9); }
  100% { box-shadow: 0 0 10px rgba(255,0,255,0.4); }
}

.special-card {
  background: linear-gradient(270deg, purple, hotpink, red, purple);
  background-size: 400% 400%;
  animation: glowMove 6s ease infinite, pulseGlow 2.5s ease infinite;
}
</style>
</head>

<body class="bg-gradient-to-br from-black via-red-950 to-black text-white font-sans">

<header class="relative flex justify-between items-center p-6 border-b border-red-600">
  <h1 class="flex items-center space-x-3 text-3xl font-bold">
    <img src="MI logo.jpg" class="h-12 w-12"/>
    <span>Medway Invicta FC</span>
  </h1>

  <nav class="hidden md:flex space-x-6">
    <a href="index.html" class="hover:text-red-400">Home</a>
    <a href="Team.html" class="hover:text-red-400">Team</a>
    <a href="Fixtures.html" class="hover:text-red-400">Fixtures</a>
    <a href="Standings.html" class="hover:text-red-400">Standings</a>
    <a href="Contact.html" class="hover:text-red-400">Contact</a>
    <a href="Gallery.html" class="hover:text-red-400">Gallery</a>
    <a href="GA.html" class="hover:text-red-400">Goals</a>
  </nav>

  <button id="burger" class="md:hidden z-50">
    <i data-lucide="menu" class="w-8 h-8 text-white"></i>
  </button>

  <div id="mobileMenu" class="absolute top-full right-6 mt-2 bg-red-950 border border-red-600 rounded-lg shadow-lg w-40 flex-col items-start p-4 space-y-2 hidden z-50">
    <a href="index.html">Home</a>
    <a href="Team.html">Team</a>
    <a href="Fixtures.html">Fixtures</a>
    <a href="Standings.html">Standings</a>
    <a href="Contact.html">Contact</a>
    <a href="Gallery.html">Gallery</a>
    <a href="GA.html">Goals</a>
  </div>
</header>

<section id="playersContainer" class="p-6 grid grid-cols-2 md:grid-cols-4 gap-6"></section>

<div id="playerModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">
  <div id="card" class="w-80 p-6 text-center relative rounded-3xl shadow-2xl text-white">

    <div class="flex justify-center -mt-10 mb-2">
      <img id="playerImg" class="w-24 h-24 rounded-full border-4 border-white object-cover">
    </div>

    <div id="overall" class="absolute top-2 left-3 text-2xl font-bold"></div>
    <div id="posBadge" class="absolute top-2 right-3 text-xs bg-black/40 px-2 py-1 rounded"></div>

    <button onclick="closeCard()" class="absolute top-1 right-2 text-xl">×</button>

    <h3 id="cardName" class="text-sm font-bold mt-2"></h3>
    <p id="cardPos" class="text-xs text-gray-200"></p>

    <div class="space-y-2 mt-3 text-xs">
      <div>PACE<div class="bg-black/30 h-2"><div id="paceBar" class="h-2 bg-white"></div></div></div>
      <div>SHO<div class="bg-black/30 h-2"><div id="shoBar" class="h-2 bg-white"></div></div></div>
      <div>PAS<div class="bg-black/30 h-2"><div id="pasBar" class="h-2 bg-white"></div></div></div>
      <div>DRI<div class="bg-black/30 h-2"><div id="driBar" class="h-2 bg-white"></div></div></div>
      <div>DEF<div class="bg-black/30 h-2"><div id="defBar" class="h-2 bg-white"></div></div></div>
      <div>PHY<div class="bg-black/30 h-2"><div id="phyBar" class="h-2 bg-white"></div></div></div>
    </div>

  </div>
</div>

<script>
lucide.createIcons();

const burger = document.getElementById("burger");
const mobileMenu = document.getElementById("mobileMenu");

burger.addEventListener("click", () => {
  mobileMenu.classList.toggle("hidden");
});

const container = document.getElementById("playersContainer");

const players = ["Evan Longman","Ben Van-de-Peer","Jamie Blackham","Connor Mudima","William Sims","Abdul-Raheem Sunmonu","Michael Shobande","Toby Ogundemuren","Samuel Shobande","Ayo Jimoh","Owen Longman","Matthew Thomas","James Rocha","Shaun Keen","Victor Okunowo","Bolu Buraimoh","Tom Mercer","Jordan Buckfield-Waller","Michael Hurcomb","Adriano Anglin","Temi Ayetigbo","Caleb Luckhurst","Oge Agwu","Yeni Yusuph","Yomi Yusuph","Thomas Ngegba","Liam Riley","Boye Oloyede"];

const positions = {
"Evan Longman":"Goalkeeper","Ben Van-de-Peer":"Defender","Jamie Blackham":"Midfielder","Connor Mudima":"Midfielder",
"William Sims":"Midfielder","Abdul-Raheem Sunmonu":"Defender","Michael Shobande":"Winger","Toby Ogundemuren":"Midfielder",
"Samuel Shobande":"Striker","Ayo Jimoh":"Striker","Owen Longman":"Defender","Matthew Thomas":"Winger",
"James Rocha":"Defender","Shaun Keen":"Defender","Victor Okunowo":"Midfielder","Bolu Buraimoh":"Midfielder",
"Tom Mercer":"Midfielder","Jordan Buckfield-Waller":"Defender","Michael Hurcomb":"Striker","Adriano Anglin":"Winger",
"Temi Ayetigbo":"Winger","Caleb Luckhurst":"Midfielder","Oge Agwu":"Midfielder","Yeni Yusuph":"Striker",
"Yomi Yusuph":"Defender","Thomas Ngegba":"Striker","Liam Riley":"Goalkeeper","Boye Oloyede":"Defender"
};

const playerImages = {
"Evan Longman":"EVAN.jpg","Ben Van-de-Peer":"BEN.jpg","Jamie Blackham":"JAMIE.jpg",
"Connor Mudima":"CONNOR.jpeg","Owen Longman":"OWEN.jpg","James Rocha":"james.jpg",
"Tom Mercer":"Mercer.jpeg","Caleb Luckhurst":"Caleb Luckhurst.jpg",
"Michael Shobande":"IMG_5046.jpeg","Matthew Thomas":"NASH.jpeg","Temi Ayetigbo":"Temi.jpg",
"Ayo Jimoh":"AJ.jpeg","Boye Oloyede":"Boye signed.png",
"Samuel Shobande":"IMG_5044.jpeg","Adriano Anglin":"IMG_5047.jpeg"
};

const defaultData = {
"Evan Longman": {overall:72},
"Ben Van-de-Peer": {overall:78},
"Jamie Blackham": {overall:85},
"Connor Mudima": {overall:76},
"William Sims": {overall:65},
"Abdul-Raheem Sunmonu": {overall:70},
"Michael Shobande": {overall:92},
"Samuel Shobande": {overall:94},
"Ayo Jimoh": {overall:90},
"Owen Longman": {overall:92},
"Matthew Thomas": {overall:84},
"James Rocha": {overall:75},
"Shaun Keen": {overall:66},
"Victor Okunowo": {overall:65},
"Bolu Buraimoh": {overall:64},
"Tom Mercer": {overall:66},
"Jordan Buckfield-Waller": {overall:73},
"Michael Hurcomb": {overall:72},
"Adriano Anglin": {overall:82},
"Temi Ayetigbo": {overall:91},
"Caleb Luckhurst": {overall:67},
"Oge Agwu": {overall:63},
"Yeni Yusuph": {overall:86},
"Yomi Yusuph": {overall:62},
"Thomas Ngegba": {overall:93},
"Liam Riley": {overall:60},
"Boye Oloyede": {overall:69}
};

let playerStats = {};

function generateStats(o,p){
  if(p==="Striker") return {pace:o-5,sho:o+5,pas:o-10,dri:o,def:o-25,phy:o-5};
  if(p==="Winger") return {pace:o+5,sho:o,pas:o-5,dri:o+5,def:o-20,phy:o-5};
  if(p==="Midfielder") return {pace:o-5,sho:o-5,pas:o+5,dri:o,def:o-5,phy:o};
  if(p==="Defender") return {pace:o-10,sho:o-20,pas:o-5,dri:o-10,def:o+10,phy:o+5};
  return {pace:o,sho:o,pas:o,dri:o,def:o,phy:o};
}

/* ⭐ AUTO CARD STYLE */
function getCardStyle(overall){
  if(overall >= 90) return "special-card";
  if(overall >= 80) return "bg-yellow-500";
  if(overall >= 70) return "bg-gray-300 text-black";
  return "bg-amber-700";
}

players.forEach(name=>{
  const img = playerImages[name] || "placeholder.jpg";

  container.innerHTML += `
  <div onclick="openCard('${name}')" class="bg-red-950 p-4 rounded-xl text-center cursor-pointer hover:scale-105 transition">
    <img src="${img}" class="h-20 w-20 mx-auto rounded-full mb-2 object-cover">
    <h3>${name}</h3>
    <p class="text-red-400 text-sm">${positions[name]}</p>
  </div>`;
});

function openCard(name){
  if(!playerStats[name]){
    let d = defaultData[name];
    playerStats[name] = {...generateStats(d.overall, positions[name]), ...d};
  }

  let s = playerStats[name];

  const card = document.getElementById("card");
  card.className = "w-80 p-6 text-center relative rounded-3xl shadow-2xl text-white";
  card.classList.add(getCardStyle(s.overall));

  playerModal.classList.remove("hidden");
  playerModal.classList.add("flex");

  cardName.innerText = name;
  cardPos.innerText = positions[name];
  posBadge.innerText = positions[name];
  overall.innerText = s.overall;

  playerImg.src = playerImages[name] || "placeholder.jpg";

  paceBar.style.width = s.pace + "%";
  shoBar.style.width = s.sho + "%";
  pasBar.style.width = s.pas + "%";
  driBar.style.width = s.dri + "%";
  defBar.style.width = s.def + "%";
  phyBar.style.width = s.phy + "%";
}

function closeCard(){
  playerModal.classList.add("hidden");
}
</script>

</body>
</html>
